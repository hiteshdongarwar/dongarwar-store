<!DOCTYPE html>
<html>

<head>
    <title>Dongarwar Admin</title>

    <style>
        body {
            font-family: Outfit, sans-serif;
            background: #f5f7fb;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: auto;
        }
        
        .card {
            background: #fff;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, .08);
            margin-bottom: 20px;
        }
        
        h2 {
            margin-bottom: 15px;
        }
        
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 15px;
            box-sizing: border-box;
        }
        
        button {
            border: none;
            cursor: pointer;
        }
        
        .add-btn {
            width: 100%;
            background: #111827;
            color: white;
            padding: 12px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
        }
        
        .product-card {
            background: white;
            border-radius: 14px;
            padding: 12px;
            margin-bottom: 12px;
            box-shadow: 0 2px 10px rgba(0, 0, 0, .06);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .product-info {
            flex: 1;
        }
        
        .product-name {
            font-weight: 700;
            margin-bottom: 4px;
        }
        
        .product-stock {
            color: #666;
            font-size: 14px;
        }
        
        .delete-btn {
            background: #ff4d4f;
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
        }
        
        .price {
            color: #16a34a;
            font-weight: 700;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="card">

            <h2>Add Product</h2>

            <input id="name" placeholder="Product Name">

            <input id="price" type="number" placeholder="Price">

            <input id="stock" type="number" placeholder="Stock">

            <input id="cat" placeholder="Category">

            <input id="img" placeholder="Image URL">

            <div id="sizesContainer"></div>

            <button type="button" onclick="addSizeField()">
    + Add Size
</button>

            <button class="add-btn" onclick="addProduct()">
Add Product
</button>

        </div>

        <div class="card">
            <h2>All Products</h2>

            <div id="productsList"></div>

        </div>

    </div>

    <script type="module" src="js/admin.js"></script>

</body>

</html>
